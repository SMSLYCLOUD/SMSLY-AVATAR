<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSLY Avatar - OBS Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Transparent for OBS */
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        #overlay-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #avatar-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        #watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            display: none;
        }

        #error-msg {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            color: #ef4444;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay-container">
        <img id="avatar-img" src="" style="display: none;" />
        <div id="watermark">Synthetic Avatar / SMSLY Avatar</div>
        <div id="error-msg"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const avatarImg = document.getElementById('avatar-img');
        const watermark = document.getElementById('watermark');
        const errorMsg = document.getElementById('error-msg');

        if (!token) {
            showError("Missing Overlay Token");
        } else {
            pollState();
            setInterval(pollState, 3000);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            avatarImg.style.display = 'none';
            watermark.style.display = 'none';
        }

        async function pollState() {
            try {
                const res = await fetch(`/api/avatar/obs-source/${token}`);
                if (!res.ok) {
                    if(res.status === 404) showError("Invalid or Expired Token");
                    return;
                }

                const data = await res.json();

                if (data.status !== 'live') {
                    showError("Session not live");
                    return;
                }

                errorMsg.style.display = 'none';

                if (data.watermark_enabled !== false) {
                    watermark.style.display = 'block';
                } else {
                    watermark.style.display = 'none';
                }

                if (data.active_skin) {
                    const src = data.active_skin.processed_asset_url || data.active_skin.source_image_url;
                    if (src && avatarImg.src !== src) {
                        avatarImg.src = src;
                        avatarImg.style.display = 'block';
                    } else if (!src) {
                        avatarImg.style.display = 'none';
                    }
                } else {
                    avatarImg.style.display = 'none';
                }

            } catch (e) {
                console.error("Polling failed", e);
            }
        }
    </script>
</body>
</html>
