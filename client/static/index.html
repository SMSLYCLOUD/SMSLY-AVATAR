<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delulu Clone</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #ff6b6b;
            color: white;
            width: 100%;
            text-align: center;
            padding: 1rem 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 800px;
            width: 90%;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
        }
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .mode-toggle button {
            background-color: #ddd;
            color: #333;
        }
        .mode-toggle button.active {
            background-color: #ff6b6b;
            color: white;
        }
        .camera-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        #videoFeed {
            width: 100%;
            max-width: 500px;
            border-radius: 5px;
            background-color: #000;
        }
        #canvasCapture {
            display: none;
        }
        input[type="text"], input[type="file"], input[type="range"] {
            width: 100%;
            padding: 0.5rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #ee5253;
        }
        button:disabled {
            background-color: #ff9f43;
            cursor: not-allowed;
        }
        .results {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        .image-box {
            flex: 1;
            text-align: center;
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 5px;
            background: #fafafa;
        }
        .image-box img {
            max-width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

<header>
    <h1>✨ Delulu Clone ✨</h1>
    <p>Apply infinite AI styles to your photos instantly!</p>
</header>

<div class="container">
    <div class="mode-toggle">
        <button type="button" id="btnUploadMode" class="active">Upload Photo</button>
        <button type="button" id="btnCameraMode">Live Camera</button>
    </div>

    <form id="uploadForm">
        <div class="form-group" id="uploadGroup">
            <label for="imageFile">Upload a Photo:</label>
            <input type="file" id="imageFile" accept="image/*">
        </div>

        <div class="camera-container" id="cameraGroup">
            <video id="videoFeed" autoplay playsinline></video>
            <button type="button" id="btnCapture">Capture Frame</button>
            <canvas id="canvasCapture"></canvas>
            <p id="captureStatus" style="color: green; font-weight: bold; display: none;">Frame Captured!</p>
        </div>

        <div class="form-group">
            <label for="prompt">Style Prompt:</label>
            <input type="text" id="prompt" placeholder="e.g., cyberpunk style, neon lights, masterpiece" required>
        </div>

        <div class="form-group">
            <label for="strength">Transformation Strength: <span id="strengthValue">0.5</span></label>
            <input type="range" id="strength" min="0.1" max="0.9" step="0.1" value="0.5">
            <small style="color: #666;">(Lower = closer to original, Higher = more AI transformation)</small>
        </div>

        <button type="submit" id="submitBtn">✨ Transform Photo ✨</button>
    </form>

    <div class="loading" id="loadingIndicator">
        Applying style... Please wait... (The first time might take a minute as it loads the model)
    </div>

    <div class="results" id="resultsArea" style="display: none;">
        <div class="image-box">
            <h3>Original</h3>
            <img id="originalImg" src="" alt="Original Image">
        </div>
        <div class="image-box">
            <h3>Transformed</h3>
            <img id="transformedImg" src="" alt="Transformed Image">
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const imageFile = document.getElementById('imageFile');
    const promptInput = document.getElementById('prompt');
    const strengthInput = document.getElementById('strength');

    // UI Elements for mode toggle and camera
    const btnUploadMode = document.getElementById('btnUploadMode');
    const btnCameraMode = document.getElementById('btnCameraMode');
    const uploadGroup = document.getElementById('uploadGroup');
    const cameraGroup = document.getElementById('cameraGroup');
    const videoFeed = document.getElementById('videoFeed');
    const canvasCapture = document.getElementById('canvasCapture');
    const btnCapture = document.getElementById('btnCapture');
    const captureStatus = document.getElementById('captureStatus');

    let currentMode = 'upload'; // 'upload' or 'camera'
    let cameraStream = null;
    let capturedBlob = null;
    const strengthValue = document.getElementById('strengthValue');
    const submitBtn = document.getElementById('submitBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const resultsArea = document.getElementById('resultsArea');
    const originalImg = document.getElementById('originalImg');
    const transformedImg = document.getElementById('transformedImg');

    strengthInput.addEventListener('input', (e) => {
        strengthValue.textContent = e.target.value;
    });

    // Mode toggling logic
    btnUploadMode.addEventListener('click', () => {
        currentMode = 'upload';
        btnUploadMode.classList.add('active');
        btnCameraMode.classList.remove('active');
        uploadGroup.style.display = 'block';
        cameraGroup.style.display = 'none';
        imageFile.required = true;
        stopCamera();
    });

    btnCameraMode.addEventListener('click', async () => {
        currentMode = 'camera';
        btnCameraMode.classList.add('active');
        btnUploadMode.classList.remove('active');
        uploadGroup.style.display = 'none';
        cameraGroup.style.display = 'flex';
        imageFile.required = false;
        await startCamera();
    });

    // Camera logic
    async function startCamera() {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            videoFeed.srcObject = cameraStream;
        } catch (err) {
            alert('Error accessing camera: ' + err.message);
        }
    }

    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
            videoFeed.srcObject = null;
        }
    }

    btnCapture.addEventListener('click', () => {
        if (!cameraStream) return;

        // Setup canvas to match video dimensions
        canvasCapture.width = videoFeed.videoWidth;
        canvasCapture.height = videoFeed.videoHeight;
        const ctx = canvasCapture.getContext('2d');
        ctx.drawImage(videoFeed, 0, 0, canvasCapture.width, canvasCapture.height);

        // Convert canvas to blob
        canvasCapture.toBlob((blob) => {
            capturedBlob = blob;
            captureStatus.style.display = 'block';

            // Preview
            const url = URL.createObjectURL(blob);
            originalImg.src = url;
            transformedImg.src = '';
            resultsArea.style.display = 'flex';

            setTimeout(() => { captureStatus.style.display = 'none'; }, 2000);
        }, 'image/jpeg', 0.9);
    });

    // Preview original image as soon as it's selected (Upload mode)
    imageFile.addEventListener('change', () => {
        if (currentMode !== 'upload') return;
        const file = imageFile.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            originalImg.src = url;
            transformedImg.src = ''; // clear previous
            resultsArea.style.display = 'flex';
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        let fileToUpload = null;

        if (currentMode === 'upload') {
            fileToUpload = imageFile.files[0];
            if (!fileToUpload) {
                alert("Please select a file to upload.");
                return;
            }
        } else {
            fileToUpload = capturedBlob;
            if (!fileToUpload) {
                alert("Please capture a frame from the camera first.");
                return;
            }
        }

        const prompt = promptInput.value;
        const strength = strengthInput.value;

        if (!prompt) return;

        // UI updates
        submitBtn.disabled = true;
        loadingIndicator.style.display = 'block';

        const formData = new FormData();
        // Append blob/file with a generic name if it's from camera
        formData.append('file', fileToUpload, currentMode === 'camera' ? 'capture.jpg' : fileToUpload.name);
        formData.append('prompt', prompt);
        formData.append('strength', strength);

        try {
            const response = await fetch('/api/transform', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(err);
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            transformedImg.src = url;

        } catch (error) {
            alert('Error transforming image: ' + error.message);
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            loadingIndicator.style.display = 'none';
        }
    });
</script>

</body>
</html>
